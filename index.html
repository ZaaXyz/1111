<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO...</title>
    <style>
        body {
            background-color: #050505;
            color: #d10000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #locked {
            text-align: center;
            color: #1a1a1a;
            letter-spacing: 8px;
            font-weight: bold;
        }

        #content {
            display: none;
            text-align: center;
        }

        /* Animasi Ngetik */
        .typewriter {
            font-size: 5rem;
            font-weight: bold;
            overflow: hidden; 
            border-right: .15em solid #d10000; 
            white-space: nowrap; 
            margin: 0 auto; 
            letter-spacing: .15em; 
            animation: 
                typing 1.5s steps(5, end),
                blink-caret .75s step-end infinite;
        }

        /* Animasi Pop-up Tombol */
        .btn-next {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            color: #d10000;
            border: 1px solid #d10000;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            text-decoration: none;
            display: inline-block;
            opacity: 0; /* Mulai dari transparan */
            transform: scale(0); /* Mulai dari nol */
            animation: popup 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 2s; /* Muncul setelah ngetik beres */
        }

        .btn-next:hover {
            background: #d10000;
            color: #000;
            box-shadow: 0 0 30px #ff0000;
        }

        /* Keyframes */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #d10000 }
        }

        @keyframes popup {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, #000 90%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="locked">
        <h2>HALOO PENUNGGU 11:11</h2>
        <p>TUNGGU JAM 11:11</p>
        <p>gueh datang dengan kegabutan coding ini 😈☠️👻</p>
    </div>

    <div id="content">
        <div class="typewriter-container" style="display: inline-block;">
            <h1 class="typewriter">HELLO.</h1>
        </div>
        <br>
        <a href="bla.html" class="btn-next">?</a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();

            const content = document.getElementById('content');
            const locked = document.getElementById('locked');

            // Aktif jam 11:11 malam (23:11)
            if (h === 20 && m >= 11) {
                content.style.display = 'block';
                locked.style.display = 'none';
            } else {
                content.style.display = 'none';
                locked.style.display = 'block';
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
